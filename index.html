<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mi Horario · Ing. de Sistemas 2026-2</title>
<style>
  :root {
    --bg: #f4f5f7;
    --panel: #ffffff;
    --border: #e2e4e9;
    --text: #1c2333;
    --muted: #6b7280;
    --accent: #2563eb;
    --danger: #dc2626;
    --danger-bg: #fef2f2;
    --hour-h: 52px; /* alto de una hora en la grilla */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ---------- Encabezado ---------- */
  header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 18px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  header h1 { font-size: 17px; font-weight: 600; }
  header .sub { font-size: 12.5px; color: var(--muted); }
  header .spacer { flex: 1; }
  .stats { font-size: 13px; color: var(--muted); display: flex; gap: 14px; }
  .stats b { color: var(--text); }
  button {
    font: inherit;
    font-size: 13px;
    padding: 7px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    cursor: pointer;
  }
  button:hover { background: #f0f2f6; }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.primary:hover { background: #1d4ed8; }
  button.danger-btn { color: var(--danger); }

  /* ---------- Aviso de choques ---------- */
  #conflictBar {
    display: none;
    background: var(--danger-bg);
    color: var(--danger);
    border-bottom: 1px solid #fecaca;
    padding: 8px 18px;
    font-size: 13px;
  }
  #conflictBar.show { display: block; }

  /* ---------- Distribución principal ---------- */
  main { flex: 1; display: flex; min-height: 0; }

  /* ---------- Panel lateral ---------- */
  aside {
    width: 340px;
    min-width: 280px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .search-box { padding: 12px; border-bottom: 1px solid var(--border); }
  .search-box input {
    width: 100%;
    font: inherit;
    font-size: 14px;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    outline: none;
  }
  .search-box input:focus { border-color: var(--accent); }
  #courseList { flex: 1; overflow-y: auto; }

  .course { border-bottom: 1px solid var(--border); }
  .course-head {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    cursor: pointer;
    user-select: none;
  }
  .course-head:hover { background: #f7f8fa; }
  .course-head .code { font-size: 11px; color: var(--muted); font-weight: 600; letter-spacing: .3px; }
  .course-head .cname { font-size: 13px; font-weight: 600; flex: 1; line-height: 1.25; }
  .course-head .badge {
    font-size: 11px;
    color: var(--muted);
    background: #eef0f4;
    padding: 2px 8px;
    border-radius: 10px;
    white-space: nowrap;
  }
  .course-head .badge.sel { background: var(--sel-color, var(--accent)); color: #fff; }
  .course-head .chev { color: var(--muted); font-size: 11px; transition: transform .15s; }
  .course.open .chev { transform: rotate(90deg); }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  .groups { display: none; padding: 0 10px 10px; }
  .course.open .groups { display: block; }
  .group {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    margin-top: 6px;
    cursor: pointer;
    font-size: 12.5px;
    position: relative;
  }
  .group:hover { border-color: var(--accent); }
  .group.selected { border-color: var(--gcolor, var(--accent)); background: var(--gbg, #eff6ff); }
  .group.conflict { border-color: #fca5a5; background: var(--danger-bg); }
  .group.selected.conflict { outline: 2px solid var(--danger); }
  .group .gname { font-weight: 600; margin-bottom: 3px; display: flex; align-items: center; gap: 6px; }
  .group .warn { color: var(--danger); font-size: 11px; font-weight: 600; margin-left: auto; }
  .group .sess { color: var(--muted); line-height: 1.5; }
  .group .sess b { color: var(--text); font-weight: 600; }

  /* ---------- Grilla del horario ---------- */
  #calWrap { flex: 1; overflow: auto; padding: 16px; }
  #calendar {
    display: grid;
    grid-template-columns: 52px repeat(var(--ndays, 6), minmax(120px, 1fr));
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    min-width: 780px;
  }
  .cal-corner, .cal-dayhead {
    position: sticky; top: 0; z-index: 5;
    background: #fafbfc;
    border-bottom: 1px solid var(--border);
    padding: 10px 4px;
    text-align: center;
    font-size: 13px;
    font-weight: 600;
  }
  .cal-times { position: relative; border-right: 1px solid var(--border); }
  .cal-times .tlabel {
    position: absolute;
    right: 6px;
    transform: translateY(-50%);
    font-size: 11px;
    color: var(--muted);
  }
  .cal-day { position: relative; border-right: 1px solid var(--border); }
  .cal-day:last-child { border-right: none; }
  .hline { position: absolute; left: 0; right: 0; border-top: 1px solid #f0f1f4; }
  .hline.major { border-top-color: var(--border); }

  .block {
    position: absolute;
    left: 3px; right: 3px;
    border-radius: 7px;
    padding: 5px 7px;
    font-size: 11.5px;
    line-height: 1.3;
    color: #fff;
    overflow: hidden;
    box-shadow: 0 1px 3px rgba(0,0,0,.15);
    cursor: pointer;
  }
  .block .bname { font-weight: 700; }
  .block .binfo { opacity: .92; font-size: 10.5px; }
  .block.conflict { outline: 3px solid var(--danger); z-index: 3; }

  #emptyMsg {
    padding: 60px 30px;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.7;
  }

  /* ---------- Impresión ---------- */
  @media print {
    aside, header .no-print, #conflictBar { display: none !important; }
    body { overflow: visible; }
    #calWrap { overflow: visible; padding: 0; }
    header { border: none; }
    .block { box-shadow: none; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>Mi Horario</h1>
    <div class="sub" id="subTitle"></div>
  </div>
  <div class="spacer"></div>
  <div class="stats no-print" id="stats"></div>
  <button class="no-print danger-btn" id="btnClear">Limpiar todo</button>
  <button class="primary no-print" id="btnPrint">Imprimir / PDF</button>
</header>

<div id="conflictBar"></div>

<main>
  <aside class="no-print">
    <div class="search-box">
      <input id="search" type="text" placeholder="Buscar materia o código..." autocomplete="off">
    </div>
    <div id="courseList"></div>
  </aside>

  <div id="calWrap">
    <div id="emptyMsg">
      Selecciona una materia en el panel de la izquierda y elige un grupo.<br>
      El horario se arma aquí automáticamente y te avisa si hay choques.
    </div>
    <div id="calendar" style="display:none"></div>
  </div>
</main>

<script src="horarios.js"></script>
    <script src="horarios_2.js"></script>
<script>
(() => {
  // Soporta múltiples datasets opcionales: HORARIOS_DATA (original), HORARIOS_DATA_2, y HORARIOS_ALL (array)
  const DATASETS = [];
  if (window.HORARIOS_DATA) DATASETS.push(window.HORARIOS_DATA);
  if (window.HORARIOS_DATA_2) DATASETS.push(window.HORARIOS_DATA_2);
  if (window.HORARIOS_ALL && Array.isArray(window.HORARIOS_ALL)) DATASETS.push(...window.HORARIOS_ALL);
  const hasMultiple = DATASETS.length > 1;
  let currentDatasetIdx = 0;

  const DAYS = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
  const DAY_ABBR = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
  const PALETTE = ['#2563eb','#059669','#d97706','#7c3aed','#db2777','#0891b2','#dc2626','#4d7c0f','#9333ea','#b45309','#0d9488','#be185d'];
  const START_H = 6, END_H = 22;

  // DATA apunta al dataset seleccionado (mantiene compatibilidad con el código existente)
  let DATA = DATASETS[currentDatasetIdx] || window.HORARIOS_DATA || { program: '', period: '', courses: [] };
  const makeStoreKey = d => `horario-${(d.program||'').replace(/\s+/g,'_')}-${d.period||''}`;
  let STORE_KEY = makeStoreKey(DATA);

  // seleccion: { [codigoMateria]: nombreGrupo }
  let selection = {};
  try { selection = JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch (e) {}
  // descarta selecciones que ya no existen en los datos
  for (const code of Object.keys(selection)) {
    const c = DATA.courses.find(c => c.code === code);
    if (!c || !c.groups.some(g => g.name === selection[code])) delete selection[code];
  }

  const openCourses = new Set(Object.keys(selection));

  // Si hay múltiples programas, inserta un selector en el header para cambiar entre ellos
  if (hasMultiple) {
    const header = document.querySelector('header');
    const select = document.createElement('select');
    select.id = 'programSelect';
    select.style.marginLeft = '12px';
    select.style.padding = '6px 10px';
    select.style.borderRadius = '8px';
    select.style.border = '1px solid var(--border)';
    select.style.font = 'inherit';
    DATASETS.forEach((d, i) => {
      const opt = document.createElement('option');
      opt.value = String(i);
      opt.textContent = `${d.program} · ${d.period}`;
      select.appendChild(opt);
    });
    select.value = String(currentDatasetIdx);
    select.onchange = () => {
      currentDatasetIdx = Number(select.value);
      DATA = DATASETS[currentDatasetIdx];
      STORE_KEY = makeStoreKey(DATA);
      try { selection = JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch (e) { selection = {}; }
      // limpiar openCourses y recargar
      openCourses.clear();
      for (const code of Object.keys(selection)) openCourses.add(code);
      document.getElementById('subTitle').textContent = `${DATA.program} · Período ${DATA.period} · Universidad Popular del Cesar`;
      renderAll();
    };
    // Inserta el selector antes del spacer para que quede en el header
    const spacer = document.querySelector('header .spacer');
    header.insertBefore(select, spacer);
  }

  document.getElementById('subTitle').textContent =
    `${DATA.program} · Período ${DATA.period} · Universidad Popular del Cesar`;

  const toMin = t => { const [h, m] = t.split(':').map(Number); return h * 60 + m; };
  // los horarios terminan en :59 -> se muestra la hora redonda siguiente
  const endDisplay = t => { const m = toMin(t) + 1; return String(Math.floor(m/60)).padStart(2,'0') + ':' + String(m%60).padStart(2,'0'); };

  const colorOf = code => {
    const codes = Object.keys(selection).sort();
    return PALETTE[codes.indexOf(code) % PALETTE.length];
  };

  function selectedSessions() {
    const out = [];
    for (const [code, gname] of Object.entries(selection)) {
      const course = DATA.courses.find(c => c.code === code);
      const group = course.groups.find(g => g.name === gname);
      for (const s of group.sessions) {
        out.push({ code, cname: course.name, gname, ...s, startMin: toMin(s.start), endMin: toMin(s.end) + 1 });
      }
    }
    return out;
  }

  function findConflicts(sessions) {
    const bad = new Set();
    const pairs = [];
    for (let i = 0; i < sessions.length; i++)
      for (let j = i + 1; j < sessions.length; j++) {
        const a = sessions[i], b = sessions[j];
        if (a.dayIdx === b.dayIdx && a.startMin < b.endMin && b.startMin < a.endMin) {
          bad.add(i); bad.add(j);
          pairs.push([a, b]);
        }
      }
    return { bad, pairs };
  }

  // ¿el grupo g de la materia code chocaría con lo ya seleccionado (de otras materias)?
  function groupConflicts(code, g) {
    const others = selectedSessions().filter(s => s.code !== code);
    for (const s of g.sessions) {
      const sa = toMin(s.start), se = toMin(s.end) + 1;
      if (others.some(o => o.dayIdx === s.dayIdx && sa < o.endMin && o.startMin < se)) return true;
    }
    return false;
  }

  /* ---------- Panel de materias ---------- */
  const listEl = document.getElementById('courseList');
  const searchEl = document.getElementById('search');

  function renderList() {
    const q = searchEl.value.trim().toLowerCase();
    listEl.innerHTML = '';
    for (const c of DATA.courses) {
      if (q && !(c.code.toLowerCase().includes(q) || c.name.toLowerCase().includes(q))) continue;
      const div = document.createElement('div');
      div.className = 'course' + (openCourses.has(c.code) ? ' open' : '');
      const selGroup = selection[c.code];
      const col = selGroup ? colorOf(c.code) : null;

      const head = document.createElement('div');
      head.className = 'course-head';
      head.innerHTML = `
        ${col ? `<span class="dot" style="background:${col}"></span>` : ''}
        <div style="flex:1">
          <div class="code">${c.code}</div>
          <div class="cname">${c.name}</div>
        </div>
        <span class="badge ${selGroup ? 'sel' : ''}" ${col ? `style="--sel-color:${col}"` : ''}>
          ${selGroup ? 'G. ' + selGroup.split('-')[0] : c.groups.length + ' grupos'}
        </span>
        <span class="chev">▶</span>`;
      head.onclick = () => {
        openCourses.has(c.code) ? openCourses.delete(c.code) : openCourses.add(c.code);
        renderList();
      };
      div.appendChild(head);

      const gwrap = document.createElement('div');
      gwrap.className = 'groups';
      for (const g of c.groups) {
        const isSel = selection[c.code] === g.name;
        const conflicts = groupConflicts(c.code, g);
        const gdiv = document.createElement('div');
        gdiv.className = 'group' + (isSel ? ' selected' : '') + (conflicts ? ' conflict' : '');
        if (isSel && col) { gdiv.style.setProperty('--gcolor', col); gdiv.style.setProperty('--gbg', col + '18'); }
        const sessHtml = g.sessions
          .slice().sort((a, b) => a.dayIdx - b.dayIdx || a.start.localeCompare(b.start))
          .map(s => `<b>${DAY_ABBR[s.dayIdx]}</b> ${s.start}–${endDisplay(s.end)} · ${s.room}`)
          .join('<br>');
        gdiv.innerHTML = `
          <div class="gname">Grupo ${g.name}${conflicts ? '<span class="warn">⚠ choca</span>' : ''}</div>
          <div class="sess">${sessHtml || '<i>sin horario publicado</i>'}</div>`;
        gdiv.onclick = () => {
          if (isSel) delete selection[c.code];
          else selection[c.code] = g.name;
          persist();
          renderAll();
        };
        gwrap.appendChild(gdiv);
      }
      div.appendChild(gwrap);
      listEl.appendChild(div);
    }
  }

  /* ---------- Grilla semanal ---------- */
  const calEl = document.getElementById('calendar');
  const emptyEl = document.getElementById('emptyMsg');

  function renderCalendar() {
    const sessions = selectedSessions();
    const { bad, pairs } = findConflicts(sessions);

    // barra de choques
    const bar = document.getElementById('conflictBar');
    if (pairs.length) {
      const msgs = pairs.map(([a, b]) =>
        `${a.code} (G.${a.gname.split('-')[0]}) y ${b.code} (G.${b.gname.split('-')[0]}) chocan el ${DAYS[a.dayIdx]} ${Math.max(a.startMin,b.startMin) === a.startMin ? a.start : b.start}`);
      bar.textContent = '⚠ ' + msgs.join('  ·  ');
      bar.classList.add('show');
    } else bar.classList.remove('show');

    if (!sessions.length) {
      calEl.style.display = 'none';
      emptyEl.style.display = 'block';
      return;
    }
    emptyEl.style.display = 'none';
    calEl.style.display = 'grid';

    const showSunday = sessions.some(s => s.dayIdx === 6);
    const nDays = showSunday ? 7 : 6;
    calEl.style.setProperty('--ndays', nDays);

    const hourH = 52;
    const totalH = (END_H - START_H) * hourH;

    let html = '<div class="cal-corner"></div>';
    for (let d = 0; d < nDays; d++) html += `<div class="cal-dayhead">${DAYS[d]}</div>`;

    // columna de horas
    html += `<div class="cal-times" style="height:${totalH}px">`;
    for (let h = START_H; h <= END_H; h++)
      html += `<div class="tlabel" style="top:${(h - START_H) * hourH}px">${String(h).padStart(2,'0')}:00</div>`;
    html += '</div>';

    for (let d = 0; d < nDays; d++) {
      html += `<div class="cal-day" style="height:${totalH}px">`;
      for (let h = START_H + 1; h < END_H; h++)
        html += `<div class="hline major" style="top:${(h - START_H) * hourH}px"></div>`;

      // bloques del día; los que se solapan se reparten en columnas lado a lado
      const daySess = sessions.map((s, i) => ({ s, i })).filter(x => x.s.dayIdx === d)
        .sort((a, b) => a.s.startMin - b.s.startMin || a.s.endMin - b.s.endMin);
      const cols = []; // fin de la última sesión en cada columna
      const layout = new Map(); // idx global -> {col, ncols, cluster}
      let cluster = [], clusterEnd = -1;
      const closeCluster = () => {
        for (const it of cluster) layout.get(it.i).ncols = cols.length;
        cols.length = 0; cluster = [];
      };
      for (const it of daySess) {
        if (cluster.length && it.s.startMin >= clusterEnd) closeCluster();
        let col = cols.findIndex(end => end <= it.s.startMin);
        if (col === -1) { col = cols.length; cols.push(0); }
        cols[col] = it.s.endMin;
        layout.set(it.i, { col, ncols: 1 });
        cluster.push(it);
        clusterEnd = Math.max(clusterEnd, it.s.endMin);
      }
      closeCluster();

      for (const { s, i } of daySess) {
        const { col, ncols } = layout.get(i);
        const top = (s.startMin - START_H * 60) / 60 * hourH;
        const height = (s.endMin - s.startMin) / 60 * hourH - 2;
        const w = 100 / ncols;
        html += `<div class="block${bad.has(i) ? ' conflict' : ''}" data-code="${s.code}"
                   style="top:${top}px;height:${height}px;background:${colorOf(s.code)};
                          left:calc(${col * w}% + 3px);right:auto;width:calc(${w}% - 6px)">
            <div class="bname">${s.code} · G.${s.gname.split('-')[0]}</div>
            <div class="binfo">${s.cname}</div>
            <div class="binfo">${s.start}–${endDisplay(s.end)} · ${s.room}</div>
          </div>`;
      }
      html += '</div>';
    }
    calEl.innerHTML = html;

    // clic en un bloque -> abre esa materia en el panel
    calEl.querySelectorAll('.block').forEach(b => {
      b.onclick = () => {
        openCourses.add(b.dataset.code);
        searchEl.value = '';
        renderList();
        const target = [...listEl.querySelectorAll('.course-head .code')].find(e => e.textContent === b.dataset.code);
        if (target) target.closest('.course').scrollIntoView({ behavior: 'smooth', block: 'start' });
      };
    });
  }

  function renderStats() {
    const sessions = selectedSessions();
    const nCourses = Object.keys(selection).length;
    const hours = sessions.reduce((a, s) => a + (s.endMin - s.startMin), 0) / 60;
    document.getElementById('stats').innerHTML = nCourses
      ? `<span><b>${nCourses}</b> materias</span><span><b>${hours % 1 ? hours.toFixed(1) : hours}</b> h/semana</span>`
      : '';
  }

  function persist() { localStorage.setItem(STORE_KEY, JSON.stringify(selection)); }
  function renderAll() { renderList(); renderCalendar(); renderStats(); }

  searchEl.addEventListener('input', renderList);
  document.getElementById('btnPrint').onclick = () => window.print();
  document.getElementById('btnClear').onclick = () => {
    if (!Object.keys(selection).length) return;
    if (confirm('¿Quitar todas las materias seleccionadas?')) {
      selection = {};
      persist();
      renderAll();
    }
  };

  renderAll();
})();
</script>
</body>
</html>
